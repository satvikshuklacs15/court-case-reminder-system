<!doctype html>
<html>
  <head>
    <title>Dashboard - Court Case Reminder</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="navbar">
      <h2>Court Case Reminder System</h2>
      <div class="menu">
        <a href="dashboard.html">Dashboard</a>
        <a href="add-case.html">Add Case</a>
        <a href="upcoming.html">Upcoming Hearings</a>
        <a href="index.html">Logout</a>
      </div>
    </div>

    <div class="stats">
      <div class="card">
        <h3 id="totalCases">0</h3>
        <p>Total Cases</p>
      </div>

      <a href="upcoming.html" class="card-link">
      <div class="card">
        <h3 id="upcomingCount">0</h3>
        <p>Upcoming Hearings</p>
      </div>
    </div>
    </a>

    <div class="container">
      <h3>Case Dashboard</h3>

      <input 
type="text" 
id="searchCase" 
placeholder="Search by Case Number..."
onkeyup="searchCase()" 
style="margin-bottom:15px; padding:8px; width:250px;">

      <table>
        <thead>
          <tr>
            <th>Case Number</th>
            <th>Department</th>
            <th onclick="sortByDate()" style="cursor:pointer">
Hearing Date ⬍
</th>
            <th>Case File</th>
            <th>Remarks</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody id="caseTable">
          <!-- Data will appear here -->
        </tbody>
      </table>
    </div>

    <script src="js/app.js"></script>
    <footer>

<p>
District Court Monitoring System | Developed for Administrative Use
</p>

</footer>

<div id="hearingPopup" class="popup">
  <div class="popup-content">
    <h3>⚠ Court Hearing Alerts</h3>

    <ul id="hearingList"></ul>

    <button onclick="closePopup()">OK</button>
  </div>
</div>

  </body>
</html>
