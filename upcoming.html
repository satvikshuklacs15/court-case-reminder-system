<!doctype html>
<html>
  <head>
    <title>Upcoming Hearings</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="navbar">
      <h2>Court Case Reminder System</h2>

      <div class="menu">
        <a href="dashboard.html">Dashboard</a>
        <a href="add-case.html">Add Case</a>
        <a href="upcoming.html">Upcoming Hearings</a>
        <a href="index.html">Logout</a>
      </div>
    </div>

    <div class="container">
      <h3>Upcoming Hearings (Within 7 Days)</h3>

      <button onclick="downloadCSV()">Download upcoming cases</button>

      <table>

            <th>Status</th>
          </tr>

        <tbody id="upcomingTable"></tbody>
      </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/app.js"></script>

    <footer>
      <p>District Court Hearing Monitoring System, Amroha | Developed by NIC | 2026</p>
    </footer>
