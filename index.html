<!doctype html>
<html>

    <title>Court Case Reminder</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>

      <h2>Court Case Reminder System</h2>

      <label>Username</label>

    <script src="js/app.js"></script>

    <footer>
      <p>District Court Hearing Monitoring System, Amroha | Developed by NIC | 2026 </p>
    </footer>
